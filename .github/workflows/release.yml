name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release bundled init
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Install lua-language-server
        uses: jdx/mise-action@v2
        with:
          tool_versions: |
            lua-language-server latest

      - name: Install Lua tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 luarocks
          sudo luarocks install busted
          sudo luarocks install luacheck
          sudo luarocks install llscheck

      - name: Validate source tree
        run: |
          export GIT_CONFIG=~/.gitconfig
          git config url."https://github.com/".insteadOf git@github.com:

          make luacheck
          make test
          make llscheck CONFIGURATION=.github/workflows/.luarc.json

      - name: Generate bundled init
        run: |
          python3 .github/workflows/inline_init.py --input init.lua --output "$RUNNER_TEMP/noplugins-init.lua"

      - name: Create temporary release validation tree
        run: |
          mkdir -p "$RUNNER_TEMP/bundle-check"
          tar --exclude=.git --exclude=.generated --exclude='init[0-9]*.lua' -cf - . | tar -C "$RUNNER_TEMP/bundle-check" -xf -

      - name: Install bundled init as the startup file
        run: |
          cp "$RUNNER_TEMP/noplugins-init.lua" "$RUNNER_TEMP/bundle-check/init.lua"

      - name: Allow GitHub Actions to clone dependencies over HTTPS
        working-directory: ${{ runner.temp }}/bundle-check
        run: |
          export GIT_CONFIG=~/.gitconfig
          git config url."https://github.com/".insteadOf git@github.com:

      - name: Luacheck bundled init tree
        working-directory: ${{ runner.temp }}/bundle-check
        run: |
          make luacheck

      - name: Test bundled init tree
        working-directory: ${{ runner.temp }}/bundle-check
        run: |
          make test

      - name: llscheck bundled init tree
        working-directory: ${{ runner.temp }}/bundle-check
        run: |
          make llscheck CONFIGURATION=.github/workflows/.luarc_release.json

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/noplugins-init.lua
          generate_release_notes: true
